<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#4f46e5"/>
  <!-- Candle 1: lower, white -->
  <line x1="22" y1="18" x2="22" y2="50" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <rect x="17" y="28" width="10" height="16" fill="#ffffff" rx="2"/>
  <!-- Candle 2: higher, green accent (trend up) -->
