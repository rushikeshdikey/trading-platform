name: Deploy

# Gate every deploy on CI green. `workflow_run` fires after the CI workflow
# completes; the `if` below skips the deploy unless CI's conclusion was
# `success`. This means a failed `alembic check` or `pytest` run blocks
# prod from being touched. `workflow_dispatch` is kept so the user can
# still force a deploy manually if they need to bypass for any reason.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write          # for AWS OIDC
  contents: read
  packages: write          # for pushing to GHCR

env:
  AWS_REGION: ap-south-1
  IMAGE_NAME: ghcr.io/${{ github.repository }}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + push image
    # Native arm64 runner — no QEMU emulation. Build is ~5× faster and
    # deterministic (the previous emulated build occasionally raced the
    # SSM upload step and left deploys in mixed states).
    runs-on: ubuntu-24.04-arm
    # Skip unless CI was successful (or this is a manual workflow_dispatch
    # run, which has no `workflow_run` event attached).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run runs against the default branch by default; pin to
          # the exact commit that CI green-lit so the image we build matches
          # what was tested.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          # On workflow_run, GITHUB_SHA points to the default branch HEAD
          # at the time `workflow_run` fired — not necessarily the commit
          # CI tested. Use head_sha from the upstream run when present.
          SHA_RAW="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHA="${SHA_RAW::7}"
          echo "tag=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build + push (linux/arm64 — t4g.micro is Graviton)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2 (SSM)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find instance id by tag
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=trading-journal" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          if [[ -z "$INSTANCE_ID" || "$INSTANCE_ID" == "None" ]]; then
            echo "No running instance tagged trading-journal" >&2
            exit 1
          fi
          echo "id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Found instance ${INSTANCE_ID}"

      - name: Upload docker-compose + Caddyfile to instance via SSM
        run: |
          # Encode locally then write on the instance — avoids escaping pain.
          COMPOSE_B64=$(base64 -w0 docker-compose.yml)
          CADDY_B64=$(base64 -w0 Caddyfile)
          aws ssm send-command \
            --instance-ids ${{ steps.ec2.outputs.id }} \
            --document-name AWS-RunShellScript \
            --comment "Upload deploy artefacts" \
            --parameters commands="[
              \"set -e\",
              \"install -d -o ec2-user -g ec2-user /opt/trading\",
              \"echo $COMPOSE_B64 | base64 -d > /opt/trading/docker-compose.yml\",
              \"echo $CADDY_B64 | base64 -d > /opt/trading/Caddyfile\",
              \"chown ec2-user:ec2-user /opt/trading/docker-compose.yml /opt/trading/Caddyfile\"
            ]" \
            --query "Command.CommandId" --output text > /tmp/cmd_id
          CMD_ID=$(cat /tmp/cmd_id)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id ${{ steps.ec2.outputs.id }}

      - name: Pull new image + restart on instance
        run: |
          # Reverted to the simple `systemctl restart trading` flow until we
          # move to ECS Fargate. The earlier zero-downtime attempt with
          # `up --wait` + `caddy reload` was less reliable than this on a
          # 1 GB box — the SSM agent stalled under memory pressure. With
          # t4g.small (2 GB) this restart still incurs ~30-60s of downtime
          # but lands every time. Real zero-downtime comes via ALB + Fargate.
          IMAGE="${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          aws ssm send-command \
            --instance-ids ${{ steps.ec2.outputs.id }} \
            --document-name AWS-RunShellScript \
            --comment "Deploy ${IMAGE}" \
            --parameters commands="[
              \"set -e\",
              \"cd /opt/trading\",
              \"if [ ! -f .env ]; then echo 'ERROR: /opt/trading/.env not found — run bootstrap first' >&2; exit 1; fi\",
              \"sed -i.bak '/^APP_IMAGE=/d' .env || true\",
              \"echo APP_IMAGE=${IMAGE} >> .env\",
              \"sudo -u ec2-user docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} 2>&1 | tail -1\",
              \"sudo -u ec2-user docker compose pull\",
              \"systemctl restart trading\",
              \"sleep 5\",
              \"sudo -u ec2-user docker compose ps\"
            ]" \
            --query "Command.CommandId" --output text > /tmp/cmd_id
          CMD_ID=$(cat /tmp/cmd_id)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id ${{ steps.ec2.outputs.id }}
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id ${{ steps.ec2.outputs.id }} \
            --query "StandardOutputContent" --output text

      - name: Health check
        run: |
          # Wait up to 60s for /health to come back via the EIP/domain.
          DOMAIN="${{ vars.APP_DOMAIN || 'trading.zilionix.com' }}"
          for i in {1..30}; do
            if curl -fsSL --max-time 3 "https://${DOMAIN}/health" >/dev/null 2>&1; then
              echo "✅ Healthy at https://${DOMAIN}/health"
              exit 0
            fi
            sleep 2
          done
          echo "::warning::/health not responding after 60s (DNS may still be propagating)"
