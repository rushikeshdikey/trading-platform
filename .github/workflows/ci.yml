name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + tests
    # Native arm64 — matches the prod Graviton target so we catch arch-specific
    # surprises before they hit prod, and the suite runs faster than emulated.
    runs-on: ubuntu-24.04-arm
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tj
          POSTGRES_PASSWORD: tj
          POSTGRES_DB: tj_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tj"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENV: dev
      SECRET_KEY: x-test-secret-key-32-chars-or-more-aaaaaaa
      # Tests use SQLite tmpfs; Postgres service is here only so we can
      # exercise the Postgres-specific Alembic path in a follow-up step.
      DATABASE_URL: sqlite:///data/journal.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests || true   # informational for now

      - name: Pytest
        env:
          DISABLE_SCHEDULER: "1"
        run: pytest tests/ -q

      - name: Alembic upgrade against Postgres (sanity)
        env:
          DATABASE_URL: postgresql+psycopg://tj:tj@localhost:5432/tj_test
        run: |
          alembic upgrade head
          alembic check
